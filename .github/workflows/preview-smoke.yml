name: Preview Worker Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-worker-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: HTTPS and WSS two-client smoke
    runs-on: ubuntu-latest
    env:
      PREVIEW_ENDPOINT: ${{ vars.GREEDY_SWEEPER_PREVIEW_ENDPOINT || 'https://greedy-sweeper-room-preview.onovich1110.workers.dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Smoke the public Preview
        run: npm run online:preview-smoke
