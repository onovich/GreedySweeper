name: Online Kill Switch Smoke

on:
  workflow_dispatch:
    inputs:
      preview_endpoint:
        description: Public Free Worker HTTPS origin
        required: true
        default: https://greedy-sweeper-room-preview.onovich1110.workers.dev
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PREVIEW_ENDPOINT: ${{ inputs.preview_endpoint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify new-room kill switch
        run: npm run online:kill-switch-smoke
